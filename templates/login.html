<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VisionCraft AI - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #7c3aed;
        --primary-dark: #6d28d9;
        --secondary: #ec4899;
        --dark: #0f172a;
        --light: #f8fafc;
        --gradient: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      }

      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }

      .login-container {
        width: 100%;
        max-width: 420px;
        padding: 15px;
      }

      .glass-card {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 40px 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        color: white;
        text-align: center;
        animation: fadeIn 0.6s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-icon {
        width: 60px;
        height: 60px;
        background: var(--gradient);
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin-bottom: 20px;
        box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
      }

      h3 {
        font-weight: 700;
        margin-bottom: 8px;
      }

      .text-muted-custom {
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      .form-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #cbd5e1;
        text-align: left;
        display: block;
        margin-bottom: 8px;
      }

      .input-group-custom {
        position: relative;
        margin-bottom: 20px;
      }

      .input-group-custom i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
        font-size: 1.1rem;
        transition: color 0.3s;
      }

      .form-control-custom {
        width: 100%;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 14px;
        padding: 12px 15px 12px 45px;
        color: white !important;
        font-size: 0.95rem;
        transition: all 0.3s;
      }

      .form-control-custom {
        -webkit-text-fill-color: white !important;
      }

      .form-control-custom:focus {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: #7c3aed !important;
        box-shadow: 0 0 15px rgba(124, 58, 237, 0.2) !important;
        outline: none;
      }

      .form-control-custom:focus + i {
        color: #7c3aed;
      }

      .btn-gradient {
        background: var(--gradient);
        color: white;
        border: none;
        border-radius: 14px;
        padding: 12px;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        margin-top: 10px;
      }

      .btn-gradient:hover {
        opacity: 0.95;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(124, 58, 237, 0.45);
        color: white;
      }

      .btn-gradient:active {
        transform: translateY(0);
      }

      .footer-links {
        margin-top: 25px;
        font-size: 0.85rem;
        color: #94a3b8;
      }

      .footer-links a {
        color: #a78bfa;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }

      .footer-links a:hover {
        color: #c084fc;
      }

      /* Notification Toast */
      .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 14px 24px;
        border-radius: 16px;
        color: white;
        z-index: 10000;
        animation: slideIn 0.3s ease;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .notification.success {
        background: #10b981;
      }

      .notification.error {
        background: #ef4444;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="glass-card">
        <div class="logo-icon">
          <i class="fas fa-magic"></i>
        </div>
        <h3>Welcome Back</h3>
        <p class="text-muted-custom">Enter your details to log in to VisionCraft AI</p>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group-custom">
              <input
                type="text"
                class="form-control-custom"
                id="username"
                placeholder="Enter your username"
                required
              />
              <i class="fas fa-user"></i>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group-custom">
              <input
                type="password"
                class="form-control-custom"
                id="password"
                placeholder="••••••••"
                required
              />
              <i class="fas fa-lock"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-gradient">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <div class="footer-links">
          Don't have an account? <a href="/register">Register here</a>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await response.json();

          if (data.success) {
            showNotification("Login successful!", "success");
            setTimeout(() => {
              window.location.href = "/";
            }, 1000);
          } else {
            showNotification(data.error || "Invalid username or password", "error");
          }
        } catch (error) {
          showNotification("A network error occurred. Please try again.", "error");
        }
      });

      function showNotification(message, type) {
        const existing = document.querySelector(".notification");
        if (existing) existing.remove();
        
        const notification = document.createElement("div");
        notification.className = `notification ${type}`;
        const icon = type === "success" ? "fa-check-circle" : "fa-exclamation-circle";
        notification.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
      }
    </script>
  </body>
</html>
